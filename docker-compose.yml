version: "3.8"

services:
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [backend]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://quantdesk:quantdesk2024@postgres:5432/quantdesk
      DATABASE_URL_SYNC: postgresql://quantdesk:quantdesk2024@postgres:5432/quantdesk
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: quantdesk-jwt-secret-2024-production-key-64chars
      DEEPSEEK_API_KEY: ""
      AGENT_LIVE_TRADING_ENABLED: "false"
    volumes: ["./data:/data"]
    depends_on: [postgres, redis]

  celery-worker:
    build: ./backend
    command: celery -A backend.tasks worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL_SYNC: postgresql://quantdesk:CHANGE_ME@postgres:5432/quantdesk
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]

  celery-beat:
    build: ./backend
    command: celery -A backend.tasks beat --loglevel=info
    environment:
      DATABASE_URL_SYNC: postgresql://quantdesk:CHANGE_ME@postgres:5432/quantdesk
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, redis]

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: quantdesk
      POSTGRES_PASSWORD: quantdesk2024
      POSTGRES_DB: quantdesk
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
